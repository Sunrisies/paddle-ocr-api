<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PaddleOCR · 文字识别</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{
  font-family:'Inter','Noto Sans SC',system-ui,-apple-system,sans-serif;
  background:#f8f9fb;color:#1a1a2e;
  display:flex;flex-direction:column;
}
::selection{background:#dbeafe;color:#1a1a2e}

/* ── Header ── */
header{
  display:flex;align-items:center;gap:14px;
  padding:18px 32px;
  border-bottom:1px solid #eaeef2;
  background:#fff;flex-shrink:0;
}
header h1{
  font-size:17px;font-weight:600;
  color:#2563eb;letter-spacing:-.3px;
}
header .badge{
  font-size:11px;padding:2px 10px;
  border-radius:999px;
  background:#eff6ff;color:#2563eb;
  font-weight:500;
}
header .status{
  margin-left:auto;
  display:flex;align-items:center;gap:6px;
  font-size:12px;color:#94a3b8;
}
header .status .dot{
  width:6px;height:6px;border-radius:50%;
  background:#22c55e;
}

/* ── Main ── */
.main{
  flex:1;display:flex;gap:20px;
  padding:20px 32px 20px;
  min-height:0;
}

/* ── Left Panel ── */
.panel{
  background:#fff;border-radius:10px;
  border:1px solid #eaeef2;
  box-shadow:0 1px 3px rgba(0,0,0,.04);
}
.panel-left{flex:1;display:flex;flex-direction:column;min-width:0}

/* ── Upload Zone ── */
.upload-zone{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:40px 32px;cursor:pointer;
  transition:all .2s;position:relative;
  border-radius:10px;
  min-height:0;
}
.upload-zone .icon-wrap{
  width:52px;height:52px;border-radius:12px;
  border:1.5px dashed #d0d7de;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:16px;color:#94a3b8;
  transition:all .2s;
}
.upload-zone .icon-wrap svg{width:22px;height:22px}
.upload-zone h2{font-size:15px;font-weight:500;margin-bottom:4px;color:#334155}
.upload-zone p{font-size:12px;color:#94a3b8}
.upload-zone.dragover{border-color:#2563eb;background:#f8faff}
.upload-zone.dragover .icon-wrap{border-color:#2563eb;color:#2563eb}
.upload-zone.has-image{padding:0;cursor:default}
.upload-zone.has-image .icon-wrap,
.upload-zone.has-image h2,
.upload-zone.has-image p{display:none}

/* ── Image Area ── */
.image-area{display:none;position:relative;width:100%;flex:1;min-height:0}
.upload-zone.has-image .image-area{display:block}
.image-area img{display:block;width:100%;height:100%;object-fit:contain}
.image-area .hl-canvas{position:absolute;inset:0;pointer-events:none;z-index:2}

/* ── Toolbar ── */
.img-toolbar{display:none;padding:10px 16px;border-top:1px solid #eaeef2;align-items:center;gap:10px;font-size:12px;flex-shrink:0}
.upload-zone.has-image .img-toolbar{display:flex}
.img-toolbar .file-info{color:#94a3b8;font-family:'Inter',monospace;font-size:11px}
.img-toolbar .btn-reset{
  background:none;border:1px solid #e0e4e8;color:#64748b;
  padding:5px 14px;border-radius:6px;cursor:pointer;
  font-size:11px;font-family:inherit;transition:all .15s;
}
.img-toolbar .btn-reset:hover{border-color:#2563eb;color:#2563eb}

/* ── Right Panel ── */
.panel-right{
  width:340px;flex-shrink:0;display:flex;flex-direction:column;
}
.panel-right .panel-header{
  padding:14px 18px;border-bottom:1px solid #eaeef2;
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.panel-right .panel-header h3{font-size:13px;font-weight:500;color:#334155}
.panel-right .panel-header .count{
  font-size:11px;padding:1px 9px;border-radius:999px;
  background:#f1f5f9;color:#64748b;font-weight:500;
}

/* ── Results ── */
.results-list{flex:1;overflow-y:auto;padding:10px;min-height:0}
.results-list::-webkit-scrollbar{width:3px}
.results-list::-webkit-scrollbar-thumb{background:#d0d7de;border-radius:2px}
.result-placeholder{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;color:#94a3b8;font-size:13px;gap:10px;
}
.result-placeholder svg{width:32px;height:32px;opacity:.35}

.result-item{
  background:#f8f9fb;border:1px solid #eaeef2;
  border-radius:8px;padding:10px 12px;margin-bottom:6px;
  opacity:0;transform:translateY(6px);
  animation:fadeIn .3s ease forwards;
  cursor:pointer;transition:all .15s;
}
.result-item.active{border-color:#2563eb;background:#eff6ff;box-shadow:0 0 0 2px rgba(37,99,235,.15)}
@keyframes fadeIn{to{opacity:1;transform:translateY(0)}}
.result-item .conf{float:right;font-size:11px;font-weight:500}
.result-item .text{font-size:13px;line-height:1.5;margin-bottom:4px;word-break:break-all;color:#1a1a2e}
.result-item .meta{display:flex;align-items:center;gap:6px;font-size:10px;color:#94a3b8}
.result-item .meta .conf-bar{flex:1;height:3px;background:#eaeef2;border-radius:2px;overflow:hidden}
.result-item .meta .conf-bar .fill{height:100%;border-radius:2px;transition:width .5s ease}

/* ── Raw Text ── */
.raw-text{border-top:1px solid #eaeef2;padding:12px 18px;flex-shrink:0}
.raw-text label{font-size:10px;color:#94a3b8;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px;display:block}
.raw-text .content{font-size:12px;line-height:1.5;color:#475569;word-break:break-all;max-height:60px;overflow-y:auto}
.raw-text .content::-webkit-scrollbar{width:3px}
.raw-text .content::-webkit-scrollbar-thumb{background:#d0d7de;border-radius:2px}
.raw-text .content:empty::before{content:'—';color:#cbd5e1}

/* ── Loading ── */
.loading-overlay{
  display:none;position:absolute;inset:0;
  background:rgba(255,255,255,.75);backdrop-filter:blur(2px);
  align-items:center;justify-content:center;flex-direction:column;gap:14px;z-index:10;border-radius:10px;
}
.loading-overlay.active{display:flex}
.spinner{width:28px;height:28px;border:2.5px solid #eaeef2;border-top-color:#2563eb;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-overlay .label{font-size:12px;color:#94a3b8}
</style>
</head>
<body>

<header>
  <h1>PaddleOCR</h1>
  <span class="badge">v1.0</span>
  <div class="status">
    <span class="dot"></span>
    <span>在线</span>
  </div>
</header>

<div class="main">
  <div class="panel panel-left">
    <div class="upload-zone" id="uploadZone">
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
      </div>
      <h2>拖拽图片到此处</h2>
      <p>或点击选择 · JPG / PNG</p>
      <div class="image-area">
        <img id="previewImg" alt="">
        <canvas class="hl-canvas" id="hlCanvas"></canvas>
      </div>
      <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <span class="label">识别中…</span>
      </div>
    </div>
    <div class="img-toolbar">
      <span class="file-info" id="fileInfo"></span>
      <button class="btn-reset" id="resetBtn">重新选择</button>
    </div>
  </div>

  <div class="panel panel-right">
    <div class="panel-header">
      <h3>识别结果</h3>
      <span class="count" id="resultCount">0</span>
    </div>
    <div class="results-list" id="resultsList">
      <div class="result-placeholder" id="placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <line x1="3" y1="9" x2="21" y2="9"/>
          <line x1="9" y1="21" x2="9" y2="9"/>
        </svg>
        <span>上传后自动识别</span>
      </div>
    </div>
    <div class="raw-text">
      <label>拼接文本</label>
      <div class="content" id="rawText"></div>
    </div>
  </div>
</div>

<script>
const uz=document.getElementById('uploadZone');
const fi=document.createElement('input');fi.type='file';fi.accept='image/*';
const img=document.getElementById('previewImg');
const hc=document.getElementById('hlCanvas');
const ld=document.getElementById('loadingOverlay');
const rl=document.getElementById('resultsList');
const ph=document.getElementById('placeholder');
const rc=document.getElementById('resultCount');
const rt=document.getElementById('rawText');
const finfo=document.getElementById('fileInfo');
const rst=document.getElementById('resetBtn');
let cur=null;
let visualUrl=null;
let results=[];        // 存储识别结果（含 bbox）
let activeIdx=-1;      // 当前高亮的索引

uz.addEventListener('click',e=>{if(!uz.classList.contains('has-image'))fi.click()});
fi.addEventListener('change',()=>{if(fi.files[0])load(fi.files[0])});
uz.addEventListener('dragover',e=>{e.preventDefault();uz.classList.add('dragover')});
uz.addEventListener('dragleave',()=>uz.classList.remove('dragover'));
uz.addEventListener('drop',e=>{e.preventDefault();uz.classList.remove('dragover');if(e.dataTransfer.files[0])load(e.dataTransfer.files[0])});
rst.addEventListener('click',reset);

function load(f){
  if(!f.type.startsWith('image/'))return;
  cur=f;
  const r=new FileReader();
  r.onload=e=>{
    img.src=e.target.result;
    uz.classList.add('has-image');
    finfo.textContent=`${f.name} (${(f.size/1024).toFixed(1)} KB)`;
    img.onload=sizeHighlightCanvas;
    ocr(f);
  };
  r.readAsDataURL(f);
}

async function ocr(f){
  ld.classList.add('active');rl.innerHTML='';rt.textContent='';rc.textContent='0';
  const fd=new FormData();fd.append('file',f);
  try{
    // 并行请求：/ocr 拿文字结果，/ocr/visual 拿渲染图
    const [ocrRes, visRes] = await Promise.all([
      fetch('/ocr',{method:'POST',body:fd}),
      fetch('/ocr/visual',{method:'POST',body:fd})
    ]);
    const d=await ocrRes.json();
    if(!d.success)throw new Error(d.message||'识别失败');
    // 显示后端渲染的带框图片
    const blob=await visRes.blob();
    if(visualUrl)URL.revokeObjectURL(visualUrl);
    visualUrl=URL.createObjectURL(blob);
    img.src=visualUrl;
    img.onload=()=>{sizeHighlightCanvas();highlightBox(0)};  // 默认高亮第一个
    // 填充结果列表
    ph.style.display='none';rc.textContent=d.results.length;
    results=d.results;  // 保存 bbox 数据
    d.results.forEach((it,i)=>{
      const dv=document.createElement('div');dv.className='result-item';dv.style.animationDelay=i*.05+'s';
      const p=(it.confidence*100).toFixed(1);
      const bc=it.confidence>=.9?'#22c55e':it.confidence>=.7?'#3b82f6':it.confidence>=.5?'#f59e0b':'#ef4444';
      dv.dataset.idx=i;
      dv.addEventListener('click',()=>highlightBox(i));
      dv.innerHTML=`<div class="text">${esc(it.text)}</div>
        <div class="meta"><span>#${i+1}</span>
        <div class="conf-bar"><div class="fill" style="width:${p}%;background:${bc}"></div></div>
        <span>${p}%</span></div>`;
      rl.appendChild(dv);
    });
    rt.textContent=d.raw_text||'—';
  }catch(e){
    rl.innerHTML=`<div style="padding:20px;text-align:center;color:#ef4444;font-size:13px">${esc(e.message)}</div>`;
  }finally{ld.classList.remove('active')}
}

function reset(){
  cur=null;uz.classList.remove('has-image');img.src='';
  if(visualUrl){URL.revokeObjectURL(visualUrl);visualUrl=null}
  rl.innerHTML='<div class="result-placeholder" id="placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg><span>上传后自动识别</span></div>';
  rt.textContent='';rc.textContent='0';finfo.textContent='';fi.value='';results=[];activeIdx=-1;
  const ctx=hc.getContext('2d');ctx.clearRect(0,0,hc.width,hc.height);
  setTimeout(()=>{document.getElementById('placeholder')&&(ph=document.getElementById('placeholder'))});
}

// ── 高亮框 ──
function getRenderRect(){
  // 计算 object-fit: contain 下图片的实际渲染位置和尺寸
  const cr=img.getBoundingClientRect();
  const cw=cr.width,ch=cr.height;
  const nw=img.naturalWidth,nh=img.naturalHeight;
  if(!nw||!nh)return{x:0,y:0,w:cw,h:ch,sx:1,sy:1};
  const ia=nw/nh,ca=cw/ch;
  let rw,rh,ox,oy;
  if(ia>ca){rw=cw;rh=cw/ia}else{rh=ch;rw=ch*ia}
  ox=(cw-rw)/2;oy=(ch-rh)/2;
  return{x:ox,y:oy,w:rw,h:rh,sx:rw/nw,sy:rh/nh};
}
function sizeHighlightCanvas(){
  const cr=img.getBoundingClientRect();
  hc.width=cr.width;hc.height=cr.height;
}
function highlightBox(idx){
  // 清除旧高亮
  document.querySelectorAll('.result-item.active').forEach(el=>el.classList.remove('active'));
  if(idx<0||idx>=results.length)return;
  activeIdx=idx;
  const el=document.querySelector(`.result-item[data-idx="${idx}"]`);
  if(el)el.classList.add('active');
  // 在 canvas 上画高亮
  const ctx=hc.getContext('2d');
  ctx.clearRect(0,0,hc.width,hc.height);
  const rr=getRenderRect();
  const it=results[idx];
  const b=it.bbox;if(!b||b.length<4)return;
  // 坐标转换：先缩放，再加居中偏移
  const p=b.map(pt=>[pt[0]*rr.sx+rr.x,pt[1]*rr.sy+rr.y]);
  ctx.beginPath();ctx.moveTo(p[0][0],p[0][1]);
  for(let j=1;j<p.length;j++)ctx.lineTo(p[j][0],p[j][1]);
  ctx.closePath();
  // 发光高亮效果
  ctx.shadowColor='rgba(37,99,235,.5)';ctx.shadowBlur=16;
  ctx.strokeStyle='#2563eb';ctx.lineWidth=3;
  ctx.stroke();
  ctx.shadowBlur=0;
  ctx.fillStyle='rgba(37,99,235,.12)';ctx.fill();
  // 序号标签
  ctx.font='600 13px Inter,sans-serif';
  ctx.fillStyle='#2563eb';
  ctx.fillRect(p[0][0]-4,p[0][1]-19,24,20);
  ctx.fillStyle='#fff';ctx.fillText(idx+1,p[0][0]+2,p[0][1]-4);
}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
</script>
</body>
</html>
